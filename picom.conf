# picom.conf — minimal, no decorations
# Docs: man picom / https://picom.app

#################################
# Backend
#################################

# xrender: safest with xf86-video-intel (SNA backend), pure CPU compositing.
# Alternatives: "glx" (GPU, smoother but avoid with xf86-video-intel+SNA),
#               "egl" (newer GL path, requires picom built with EGL support).
backend = "xrender";

# Sync rendering to vblank. Prevents tearing. Leave on unless you see stutter.
vsync = true;

# Only redraw screen regions that actually changed. Better performance.
use-damage = true;


#################################
# Shadows — disabled
#################################

shadow = false;

# To enable drop shadows, set shadow = true and tune:
# shadow-radius = 7;       # blur radius in pixels (default 12)
# shadow-opacity = 0.6;    # 0.0–1.0 (default 0.75)
# shadow-offset-x = -7;    # horizontal offset (default -15)
# shadow-offset-y = -7;    # vertical offset (default -15)
# shadow-color = "#000000";
#
# Exclude shadows on specific windows:
# rules: ({
#   match = "window_type = 'dock' || window_type = 'desktop'";
#   shadow = false;
# })


#################################
# Fading — disabled
#################################

fading = false;

# To enable fade-in/out on open/close and opacity changes:
# fading = true;
# fade-in-step = 0.03;    # opacity step while fading in  (default 0.028)
# fade-out-step = 0.03;   # opacity step while fading out (default 0.03)
# fade-delta = 10;        # ms between steps (default 10)
# no-fading-openclose = false;   # set true to skip fade on open/close only


#################################
# Opacity / Transparency
#################################

# Dim inactive windows (0.0 = no dimming, 1.0 = fully dimmed to black).
# inactive-dim = 0.0;

# Per-window opacity rules — example: make terminals slightly transparent:
# rules: ({
#   match = "class_g = 'Alacritty'";
#   opacity = 0.95;
# })

# Detect _NET_WM_WINDOW_OPACITY set by apps themselves.
detect-client-opacity = true;


#################################
# Rounded corners — disabled
#################################

corner-radius = 0;

# To enable rounded corners:
# corner-radius = 8;
#
# Exclude specific windows from rounding:
# rules: ({
#   match = "window_type = 'dock' || window_type = 'desktop'";
#   corner-radius = 0;
# })


#################################
# Blur — disabled
#################################

# To enable background blur behind transparent windows:
# blur-method = "dual_kawase";  # or "gaussian", "box", "kernel"
# blur-strength = 5;            # 1–20, dual_kawase only
# blur-size = 12;               # gaussian/box only
#
# rules: ({
#   match = "class_g = 'Alacritty'";
#   blur-background = true;
# })


#################################
# Window grouping / focus
#################################

# Group WM_TRANSIENT_FOR windows (e.g. dialogs follow parent focus state).
detect-transient = true;
